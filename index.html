<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔RPG V3.0</title>

<style>
body{background:#111;color:white;font-family:sans-serif;margin:0}
.game{max-width:520px;margin:auto;padding:10px}
.panel{background:#1b1b1b;padding:10px;margin:8px 0;border-radius:10px}
.bar{width:100%;height:20px;background:#333;border-radius:10px}
.hpbar{background:red;height:100%}
.enemybar{background:lime;height:100%}
button{background:#333;color:white;border:none;padding:8px;margin:3px;border-radius:6px}
.big{width:100%;padding:14px;font-size:18px}
.inventory{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.item{background:#222;padding:6px;border-radius:8px}
.log{background:#000;height:120px;overflow:auto;font-size:13px;padding:6px}
</style>

</head>

<body>

<div class="game">

<h2>🏯塔RPG V3.0</h2>

<div class="panel">
<div id="enemy"></div>
<div class="bar"><div id="enemybar" class="enemybar"></div></div>
<div id="enemyHP"></div>
</div>

<div class="panel">

階層 <span id="floor"></span>

<div class="bar"><div id="hpbar" class="hpbar"></div></div>

HP <span id="hp"></span><br>
MP <span id="mp"></span><br>
Lv <span id="level"></span><br>
EXP <span id="exp"></span><br>
💰 <span id="gold"></span>

</div>

<div class="panel">

<button class="big" onclick="playerAttack()">⚔攻撃</button> <button class="big" onclick="toggleAuto()">🤖オート</button>

優先スキル <select id="prioritySkill">

<option value="0">🔥</option>
<option value="1">❄</option>
<option value="2">⚡</option>
<option value="3">💖</option>
<option value="4">🩸</option>
<option value="5">✨</option>
</select>

<div id="skills"></div>

</div>

<div class="panel">

<h3>🎒装備</h3>

<button onclick="sortATK()">ATK</button> <button onclick="sortDEF()">DEF</button> <button onclick="sortMP()">MP</button> <button onclick="combine()">🔨合成</button>

<div id="inventory" class="inventory"></div>

</div>

<div class="panel">

<h3>🏪ショップ</h3>

<button onclick="buyPotion()">HPポーション 20G</button> <button onclick="gacha()">装備ガチャ 100G</button>

</div>

<button class="big" onclick="save()">💾セーブ</button>

<div class="panel">

<h3>⚔戦闘ログ</h3>
<div id="log" class="log"></div>

</div>

</div>

<script>

let floor=1
let level=1
let exp=0
let expMax=10

let playerMax=100
let playerHP=100

let playerMaxMP=50
let playerMP=50

let attack=5
let defense=2

let gold=100

let enemy=""
let enemyHP=0
let enemyMax=0

let auto=false

let inventory=[]

let rarity=["common","rare","epic","legend","mythic"]

let logHistory=[]

function log(t){
logHistory.unshift(t)
if(logHistory.length>8)logHistory.pop()
document.getElementById("log").innerHTML=logHistory.join("<br>")
}

function spawnEnemy(){

let list=["スライム","ゴブリン","オオカミ","骸骨"]

enemy=list[Math.floor(Math.random()*list.length)]

enemyMax=20+floor*5

if(floor%10==0){
enemy="🐉ボス"
enemyMax=200+floor*10
}

enemyHP=enemyMax

document.getElementById("enemy").innerText=enemy

}

function playerAttack(){

let dmg=attack

enemyHP-=dmg

log("⚔ "+dmg)

playerMP+=5
if(playerMP>playerMaxMP)playerMP=playerMaxMP

battleCheck()

}

function enemyAttack(){

if(enemyHP<=0)return

let dmg=5+floor-defense

if(dmg<1)dmg=1

if(enemy.includes("ボス")){

let r=Math.random()

if(r<0.3){

dmg*=2
log("🐉強攻撃 "+dmg)

}

else if(r<0.45){

let heal=Math.floor(enemyMax*0.1)

enemyHP+=heal

if(enemyHP>enemyMax)enemyHP=enemyMax

log("🐉ボス回復 "+heal)

update()
return

}

}

playerHP-=dmg

log("👾 "+dmg)

if(playerHP<=0){

let choice=confirm("ゲームオーバー\nOK=セーブ地点\nキャンセル=最初から")

if(choice){
load()
}else{
location.reload()
}

}

update()

}

function battleCheck(){

if(enemyHP<=0){

gold+=10+floor

exp+=5

dropItem()

setTimeout(next,300)

}else{

enemyAttack()

}

update()

}

let skills=[

{name:"🔥",cost:20,action(){
if(playerMP<20)return
playerMP-=20
let dmg=attack*3
enemyHP-=dmg
log("🔥 "+dmg)
battleCheck()
}},

{name:"❄",cost:15,action(){
if(playerMP<15)return
playerMP-=15
let dmg=attack*2
enemyHP-=dmg
log("❄ "+dmg)
battleCheck()
}},

{name:"⚡",cost:25,action(){
if(playerMP<25)return
playerMP-=25
let dmg=attack*2.5
enemyHP-=dmg
log("⚡ "+dmg)
battleCheck()
}},

{name:"💖",cost:15,action(){
if(playerMP<15)return
playerMP-=15
playerHP+=40
if(playerHP>playerMax)playerHP=playerMax
log("💖回復")
update()
enemyAttack()
}},

{name:"🩸",cost:20,action(){
if(playerMP<20)return
playerMP-=20
let dmg=attack*2
enemyHP-=dmg
let heal=Math.floor(dmg/2)
playerHP+=heal
if(playerHP>playerMax)playerHP=playerMax
log("🩸"+dmg+" / "+heal)
battleCheck()
}},

{name:"✨",cost:20,action(){
if(playerMP<20)return
playerMP-=20
let heal=Math.floor(playerMax*0.25)
playerHP+=heal
if(playerHP>playerMax)playerHP=playerMax
log("✨"+heal+"回復")
update()
enemyAttack()
}}

]

function drawSkills(){

let html=""

skills.forEach((s,i)=>{
html+=`<button onclick="skills[${i}].action()">${s.name}</button>`
})

document.getElementById("skills").innerHTML=html

}

function autoBattle(){

if(!auto)return

let enemyDamage = 5 + floor - defense

if(enemyDamage < 1) enemyDamage = 1

if(playerHP - enemyDamage*2 <= 0){

auto=false
log("⚠危険！オート解除")
return

}

let p = Number(document.getElementById("prioritySkill").value)

if(playerMP >= skills[p].cost){
skills[p].action()
}else{
playerAttack()
}

}

setInterval(autoBattle,900)

function toggleAuto(){auto=!auto}

function createItem(){

let types=["sword","armor","ring"]

let type=types[Math.floor(Math.random()*3)]

let atk=Math.floor(Math.random()*20)+floor
let def=Math.floor(Math.random()*15)
let mp=Math.floor(Math.random()*20)

return{type,atk,def,mp}

}

function dropItem(){

if(Math.random()>0.3)return

inventory.push(createItem())

drawInventory()

}

function drawInventory(){

let html=""

inventory.forEach((i,index)=>{

let icon=""

if(i.type=="sword")icon="⚔"
if(i.type=="armor")icon="🛡"
if(i.type=="ring")icon="💍"

html+=`
<div class="item">
${icon}<br>
ATK:${i.atk}<br>
DEF:${i.def}<br>
MP:${i.mp}<br>
<button onclick="equip(${index})">装備</button>
<button onclick="sell(${index})">売却</button>
</div>
`

})

document.getElementById("inventory").innerHTML=html

}

function equip(i){

let item=inventory[i]

attack+=item.atk
defense+=item.def
playerMaxMP+=item.mp

update()

}

function sell(i){

gold+=20

inventory.splice(i,1)

drawInventory()

update()

}

function combine(){

if(inventory.length<3)return

inventory.splice(0,3)

inventory.push(createItem())

drawInventory()

}

function sortATK(){inventory.sort((a,b)=>b.atk-a.atk);drawInventory()}
function sortDEF(){inventory.sort((a,b)=>b.def-a.def);drawInventory()}
function sortMP(){inventory.sort((a,b)=>b.mp-a.mp);drawInventory()}

function buyPotion(){

if(gold<20)return

gold-=20

playerHP+=50

if(playerHP>playerMax)playerHP=playerMax

update()

}

function gacha(){

if(gold<100)return

gold-=100

inventory.push(createItem())

drawInventory()

}

function next(){

floor++

spawnEnemy()

update()

}

function levelUp(){

if(exp>=expMax){

exp-=expMax

level++

expMax=Math.floor(expMax*1.4)

playerMax+=20
attack+=2
defense+=1
playerMaxMP+=10

playerHP=playerMax
playerMP=playerMaxMP

}

}

function save(){

let data={
floor,
level,
exp,
playerHP,
playerMP,
attack,
defense,
gold,
inventory
}

localStorage.setItem("towerRPG",JSON.stringify(data))

log("💾セーブ")

}

function load(){

let data=localStorage.getItem("towerRPG")

if(!data)return

let d=JSON.parse(data)

floor=d.floor
level=d.level
exp=d.exp
playerHP=d.playerHP
playerMP=d.playerMP
attack=d.attack
defense=d.defense
gold=d.gold
inventory=d.inventory

spawnEnemy()
drawInventory()
update()

}

function update(){

levelUp()

document.getElementById("floor").innerText=floor
document.getElementById("hp").innerText=playerHP+"/"+playerMax
document.getElementById("mp").innerText=playerMP+"/"+playerMaxMP
document.getElementById("level").innerText=level
document.getElementById("exp").innerText=exp+"/"+expMax
document.getElementById("gold").innerText=gold
document.getElementById("enemyHP").innerText=enemyHP+"/"+enemyMax

document.getElementById("hpbar").style.width=(playerHP/playerMax*100)+"%"
document.getElementById("enemybar").style.width=(enemyHP/enemyMax*100)+"%"

}

spawnEnemy()
drawSkills()
drawInventory()
update()

</script>

</body>
</html>
